<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LedgerCoon Sovereign</title>
    <link rel="stylesheet" href="style.css">
    <script src="lang.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body data-theme="dark">

    <div id="splash-screen">
        <img src="img/splash.png" class="splash-logo">
        <h1 style="color:#00d2ff; font-weight:900;">LedgerCoon</h1>
        <p id="splash-quote">Wczytywanie...</p>
        <span style="margin-top:20px; color:#00d2ff; font-weight:bold;">@kryspinowskyy</span>
    </div>

    <div id="app-container">
        <header class="main-header">
            <div class="profile-section" onclick="alert('Avatar wkrótce.')">
                <div class="avatar-wrapper">
                    <img id="avatar-img" src="">
                </div>
            </div>
            <div id="clock-display" class="glass-clock">00:00</div>
        </header>

        <main id="dashboard">
            <div class="stashek-box">
                <div class="speech-bubble">
                    <p id="stashek-talk">Księgi otwarte. Co psujemy?</p>
                </div>
                <img src="img/icon.png" id="stashek-mood">
            </div>

            <div class="budget-card">
                <p style="font-size:0.7rem; opacity:0.6; letter-spacing:1px;">LIMIT DZIENNY</p>
                <h2 id="daily-amount">0.00</h2>
                <div id="streak-display">⏳ Paliwa na: -- dni</div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-icon" onclick="openMiniGame()">🎮</button>
            <button class="add-btn" onclick="openExpenseModal()">+</button>
            <button class="nav-icon" onclick="toggleStash()">⚙️</button>
        </nav>
    </div>

    <div id="stash-layer" class="hidden-view">
        <button onclick="toggleStash()" class="back-btn">← WRÓĆ</button>
        <h2>SKARBIEC</h2>
        <small>USTAWIENIA BAZOWE</small>
        <input type="number" id="base-income" placeholder="Wypłata netto" onchange="updateBase()">
        <input type="number" id="base-bills" placeholder="Suma rachunków" onchange="updateBase()">
        <input type="date" id="base-payday" onchange="updateBase()">
        
        <small style="margin-top:20px; display:block;">STRATEGIA</small>
        <textarea id="shadow-notes" oninput="saveNotes()" placeholder="Twoje plany..."></textarea>
    </div>

</body>
</html>
