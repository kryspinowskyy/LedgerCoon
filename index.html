<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LedgerCoon Sovereign</title>
    <link rel="stylesheet" href="style.css">
    <script src="lang.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body data-theme="dark">

    <div id="splash-screen">
        <img src="img/splash.png" class="splash-logo">
        <h1 style="color:#00d2ff; margin-bottom:10px;">LedgerCoon</h1>
        <p id="splash-quote" style="opacity:0.6; font-style:italic; text-align:center; padding:0 20px;">Wczytywanie protokołu...</p>
        <span style="margin-top:40px; color:#00d2ff; font-weight:bold; letter-spacing:1px;">@kryspinowskyy</span>
    </div>

    <div id="app-container" style="display:none;">
        <header class="main-header">
            <div class="profile-section" onclick="triggerAvatarUpload()">
                <div class="avatar-wrapper">
                    <svg class="progress-ring" width="50" height="50">
                        <circle class="progress-ring__circle" stroke="#00d2ff" stroke-width="3" fill="transparent" r="22" cx="25" cy="25"/>
                    </svg>
                    <div class="avatar-circle">
                        <img id="avatar-img" src="" style="display:none;">
                    </div>
                </div>
                <div class="rank-info">
                    <span id="rank-name">Dust Collector</span>
                    <small id="xp-text">0 / 1000 XP</small>
                </div>
            </div>
            <div id="clock-display" class="glass-clock">00:00</div>
        </header>

        <main id="dashboard">
            <div class="stashek-box">
                <div class="speech-bubble">
                    <p id="stashek-talk">"Księgi otwarte. Co tam psujemy dzisiaj?"</p>
                </div>
                <img src="img/icon.png" id="stashek-mood">
            </div>

            <div class="budget-card">
                <p style="font-size:0.7rem; opacity:0.6; letter-spacing:1px;">LIMIT DZIENNY</p>
                <h2 id="daily-amount">0.00</h2>
                <div id="streak-display" style="margin-top:10px; font-weight:bold; font-size:0.8rem;">⏳ Paliwa na: -- dni</div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-icon" onclick="openMiniGame()">🎮</button>
            <button class="add-btn" onclick="openExpenseModal()">+</button>
            <button class="nav-icon" onclick="toggleSettings()">⚙️</button>
        </nav>
    </div>

    <div id="stash-layer" class="hidden-view">
        <button onclick="toggleStash()" style="color:var(--accent); background:none; border:none; font-size:1.5rem; text-align:left;">← POWRÓT</button>
        <h2 style="margin:20px 0;">SKARBIEC</h2>
        <textarea id="shadow-notes" oninput="saveNotes()" style="width:100%; height:200px; background:rgba(0,0,0,0.2); border:1px solid var(--accent); color:white; padding:15px; border-radius:15px; font-family:inherit;" placeholder="Twoje zapiski..."></textarea>
    </div>

    <div id="settings-modal" class="modal">
        <h3 style="color:var(--accent); margin-bottom:20px;">USTAWIENIA</h3>
        <button onclick="toggleTheme()" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid var(--accent); background:none; color:white;">ZMIEŃ MOTYW</button>
        <button onclick="toggleSettings()" style="width:100%; padding:15px; border-radius:10px; background:var(--accent); color:black; font-weight:bold; border:none;">ZAMKNIJ</button>
    </div>

    <input type="file" id="avatar-input" style="display:none" accept="image/*">
</body>
</html>
