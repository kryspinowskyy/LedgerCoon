<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LedgerCoon Sovereign</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <div id="splash-screen">
        <img src="img/splash.png" class="splash-logo">
        <h1 style="color:#00d2ff; font-weight:900;">LedgerCoon</h1>
        <p id="splash-quote" style="padding:20px; opacity:0.7; font-style:italic; text-align:center;">Inicjalizacja...</p>
    </div>

    <div id="app-container" style="display:none;">
        <header class="main-header">
            <div class="profile-section" onclick="triggerAvatarUpload()">
                <div class="avatar-wrapper">
                    <svg class="progress-ring" width="50" height="50">
                        <circle class="progress-ring__circle" stroke="#00d2ff" stroke-width="3" fill="transparent" r="22" cx="25" cy="25"/>
                    </svg>
                    <div class="avatar-circle"><img id="avatar-img" src=""></div>
                </div>
                <div class="rank-info">
                    <span id="rank-name">Dust Collector</span>
                    <small id="xp-text">0 XP</small>
                </div>
            </div>
            <div id="clock-display" class="glass-clock">00:00</div>
        </header>

        <main id="dashboard">
            <div class="stashek-box">
                <div class="speech-bubble glass">
                    <p id="stashek-talk">Księgi otwarte. Co tam psujemy dzisiaj?</p>
                </div>
                <img src="img/icon.png" id="stashek-mood">
            </div>

            <div class="budget-card glass">
                <small style="letter-spacing:2px; opacity:0.6;">LIMIT DZIENNY</small>
                <h2 id="daily-amount">0.00</h2>
                <div id="streak-display">⏳ Paliwa na: -- dni</div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-icon" onclick="openMiniGame()">🎮</button>
            <button class="add-btn" onclick="openExpenseModal()">+</button>
            <button class="nav-icon" onclick="toggleSettings()">⚙️</button>
        </nav>
    </div>

    <div id="stash-layer" class="hidden-view">
        <button onclick="toggleStash()" class="back-btn">← WRÓĆ</button>
        <h2 style="margin-bottom:20px; color:#00d2ff">SKARBIEC</h2>
        <div class="planning-box glass">
            <small>USTAWIENIA BAZOWE</small>
            <input type="number" id="base-income" placeholder="Wypłata netto" onchange="updateBase()">
            <input type="number" id="base-bills" placeholder="Stałe rachunki" onchange="updateBase()">
            <input type="date" id="base-payday" onchange="updateBase()">
        </div>
        <textarea id="shadow-notes" oninput="saveNotes()" placeholder="Strategia i cele..."></textarea>
    </div>

    <div id="expense-modal" class="modal">
        <div class="modal-content glass">
            <div class="quick-amounts">
                <button onclick="quickAdd(10)">+10</button>
                <button onclick="quickAdd(20)">+20</button>
                <button onclick="quickAdd(50)">+50</button>
            </div>
            <input type="number" id="exp-val" placeholder="0.00" inputmode="decimal">
            <button onclick="confirmExpense()" class="btn-pri">DODAJ</button>
            <button onclick="closeModal()" class="btn-sec">ANULUJ</button>
        </div>
    </div>

    <input type="file" id="avatar-input" style="display:none" accept="image/*">
    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>
</html>
