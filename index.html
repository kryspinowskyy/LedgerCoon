<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LedgerCoon Sovereign</title>
    <link rel="stylesheet" href="style.css">
    <script src="lang.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body data-theme="dark">

    <div id="splash-screen">
        <img src="img/splash.png" class="splash-logo">
        <h1 style="color:#00d2ff">LedgerCoon</h1>
        <p id="splash-quote" style="text-align:center; padding:20px; opacity:0.7 italic">Inicjalizacja...</p>
        <span style="margin-top:20px; color:#00d2ff; font-weight:bold">@kryspinowskyy</span>
    </div>

    <div id="app-container" style="display:none;">
        <header class="main-header">
            <div class="profile-section" onclick="triggerAvatarUpload()">
                <div class="avatar-wrapper">
                    <svg class="progress-ring" width="50" height="50">
                        <circle class="progress-ring__circle" stroke="#00d2ff" stroke-width="3" fill="transparent" r="22" cx="25" cy="25"/>
                    </svg>
                    <div class="avatar-circle">
                        <img id="avatar-img" src="" style="display:none;">
                    </div>
                </div>
                <div class="rank-info">
                    <span id="rank-name">Dust Collector</span>
                    <small id="xp-text">0 / 1000 XP</small>
                </div>
            </div>
            <div id="clock-display" class="glass-clock">00:00</div>
        </header>

        <main id="dashboard">
            <div class="stashek-box">
                <div class="speech-bubble">
                    <p id="stashek-talk">Ładowanie protokołów...</p>
                </div>
                <img src="img/icon.png" id="stashek-mood">
            </div>

            <div class="budget-card">
                <p class="label">LIMIT DZIENNY</p>
                <h2 id="daily-amount">0.00</h2>
                <div class="survival-badge" id="streak-display">⏳ Paliwa na: -- dni</div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-icon" onclick="openMiniGame()">🎮</button>
            <button class="add-btn" onclick="openExpenseModal()">+</button>
            <button class="nav-icon" onclick="toggleSettings()">⚙️</button>
        </nav>
    </div>

    <input type="file" id="avatar-input" style="display:none" accept="image/*">
</body>
</html>
