<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LedgerCoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <div id="splash-screen">
        <img src="img/splash.png" class="splash-logo">
        <h1 style="color:#00d2ff">LedgerCoon</h1>
        <p id="splash-quote">Ładowanie...</p>
    </div>

    <div id="app-container">
        <header class="main-header">
            <div style="color:var(--accent); font-weight:bold;">AGENT</div>
            <div id="clock-display" class="glass-clock">00:00</div>
        </header>

        <main id="dashboard">
            <img src="img/icon.png" id="stashek-mood">
            <div class="budget-card">
                <small>LIMIT DZIENNY</small>
                <h2 id="daily-amount">0.00</h2>
            </div>
        </main>

        <nav class="bottom-nav">
            <button onclick="location.reload()" style="background:none; border:none; color:white;">🔄</button>
            <button class="add-btn" onclick="openExpenseModal()">+</button>
            <button class="nav-icon" onclick="toggleSettings()" style="background:none; border:none; color:white; font-size:1.5rem;">⚙️</button>
        </nav>
    </div>

    <div id="expense-modal" class="modal">
        <h2 style="color:var(--accent)">WYDATEK</h2>
        <input type="number" id="exp-val" style="padding:15px; margin:20px; border-radius:10px;">
        <button onclick="closeModal()" style="color:white; background:none; border:1px solid white; padding:10px 20px;">ANULUJ</button>
    </div>

    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>
</html>
